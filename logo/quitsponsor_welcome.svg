<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <radialGradient id="bg" cx="30%" cy="35%" r="90%">
      <stop offset="0%" stop-color="#1d2b4f"/>
      <stop offset="100%" stop-color="#0c1226"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ff5f6d"/>
    </linearGradient>
  </defs>

  <rect width="640" height="360" fill="url(#bg)"/>

  <!-- stars -->
  <circle cx="60" cy="52" r="3" fill="#f5ead9" opacity="0.8"/>
  <circle cx="300" cy="38" r="2.5" fill="#f5ead9" opacity="0.6"/>
  <circle cx="558" cy="60" r="3" fill="#f5ead9" opacity="0.7"/>
  <circle cx="614" cy="150" r="2" fill="#f5ead9" opacity="0.5"/>
  <circle cx="410" cy="80" r="2" fill="#f5ead9" opacity="0.5"/>
  <circle cx="500" cy="300" r="2.5" fill="#f5ead9" opacity="0.45"/>
  <circle cx="40" cy="280" r="2.5" fill="#f5ead9" opacity="0.5"/>

  <!-- buoy-bubble, left -->
  <g transform="translate(150,180) scale(0.62)">
    <path d="M -60 140 L -88 214 L 2 156 Z" fill="url(#ring)"/>
    <circle cx="0" cy="0" r="150" fill="none" stroke="url(#ring)" stroke-width="58"/>
    <g stroke="#f5ead9" stroke-width="14" stroke-linecap="round">
      <line x1="0" y1="-172" x2="0" y2="-130"/>
      <line x1="0" y1="130" x2="0" y2="172"/>
      <line x1="-172" y1="0" x2="-130" y2="0"/>
      <line x1="130" y1="0" x2="172" y2="0"/>
    </g>
    <clipPath id="inner"><circle cx="0" cy="0" r="121"/></clipPath>
    <g clip-path="url(#inner)">
      <circle cx="0" cy="0" r="121" fill="#0c1226"/>
      <path d="M -146 20 Q -96 -30 -46 14 T 54 14 T 154 14 L 154 132 L -146 132 Z"
            fill="#2e6fb0" opacity="0.85"/>
      <path d="M -146 48 Q -91 4 -36 44 T 74 44 T 174 44 L 174 132 L -146 132 Z"
            fill="#1d4f86" opacity="0.9"/>
      <circle cx="44" cy="-56" r="26" fill="#f5ead9"/>
      <circle cx="32" cy="-66" r="24" fill="#0c1226"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="288" y="168" font-family="DejaVu Sans, sans-serif" font-weight="bold"
        font-size="46" fill="#f5ead9">Quit<tspan fill="#ff8a3d">Sponsor</tspan></text>
  <text x="290" y="206" font-family="DejaVu Sans, sans-serif" font-size="19"
        fill="#f5ead9" opacity="0.75">always awake, never judging</text>
</svg>
